<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Maple Designs Creations — All our links in one place" />
  <title>Maple Designs Creations</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --maple-red:    #c0392b;
      --maple-orange: #e67e22;
      --maple-amber:  #f39c12;
      --cream:        #fdf6ec;
      --dark:         #1a0a00;
      --text:         #3d1a00;
      --muted:        #8a6a55;
      --card-bg:      #ffffff;
      --shadow:       0 4px 24px rgba(60, 20, 0, 0.10);
      --radius:       14px;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;

      /* subtle leaf-texture via radial gradients */
      background-image:
        radial-gradient(ellipse at 15% 10%, rgba(230,126,34,.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 90%, rgba(192,57,43,.10) 0%, transparent 55%);
    }

    /* ─── Page wrapper ─────────────────────────────────── */
    .page {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ─── Header / Logo area ───────────────────────────── */
    .header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      width: 100%;
    }

    /* Logo */
    .leaf-icon {
      display: inline-block;
      width: 160px;
      height: auto;
      margin-bottom: 1rem;
      filter: drop-shadow(0 4px 12px rgba(192,57,43,.35));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 700;
      line-height: 1.2;
      background: linear-gradient(135deg, var(--maple-red), var(--maple-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header .tagline {
      margin-top: .5rem;
      font-size: .95rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: .03em;
    }

    /* ─── Divider ──────────────────────────────────────── */
    .divider {
      width: 60px;
      height: 3px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--maple-red), var(--maple-amber));
      margin: 1.25rem auto 2rem;
    }

    /* ─── Link List ────────────────────────────────────── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: .85rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      padding: 1rem 1.25rem;
      background: var(--card-bg);
      border: 1.5px solid rgba(192,57,43,.12);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      font-size: 1rem;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      position: relative;
      overflow: hidden;
    }

    /* left accent bar */
    .link-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
      background: linear-gradient(180deg, var(--maple-red), var(--maple-amber));
      transform: scaleY(0);
      transition: transform .18s ease;
    }

    .link-btn:hover,
    .link-btn:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(60,20,0,.15);
      border-color: rgba(192,57,43,.3);
      outline: none;
    }

    .link-btn:hover::before,
    .link-btn:focus-visible::before {
      transform: scaleY(1);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    /* icon wrapper */
    .link-icon {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .link-icon svg {
      width: 22px;
      height: 22px;
    }

    /* platform colour themes */
    .icon-facebook  { background: #e7f0fd; }
    .icon-facebook svg { fill: #1877f2; }

    .icon-instagram { background: linear-gradient(135deg,#fceabb,#f8b500,#e6005a,#9b00ab); }
    .icon-instagram svg { fill: #fff; }

    .icon-email     { background: #fdecea; }
    .icon-email svg { fill: var(--maple-red); }

    .link-label {
      flex: 1;
    }

    .link-label .platform {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      line-height: 1;
      margin-bottom: .2rem;
    }

    .link-label .action {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.2;
    }

    .link-arrow {
      flex-shrink: 0;
      color: var(--muted);
      transition: transform .18s ease, color .18s ease;
    }

    .link-btn:hover .link-arrow,
    .link-btn:focus-visible .link-arrow {
      transform: translateX(4px);
      color: var(--maple-red);
    }

    /* ─── Footer ───────────────────────────────────────── */
    .footer {
      margin-top: 2.5rem;
      font-size: .8rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .footer strong {
      color: var(--maple-red);
      font-weight: 600;
    }

    /* ─── Responsive tweaks ────────────────────────────── */
    @media (max-width: 380px) {
      .link-btn { padding: .875rem 1rem; gap: .75rem; }
      .link-icon { width: 38px; height: 38px; }
    }

    @media (min-width: 768px) {
      body { padding: 3rem 1.5rem 5rem; }
      .leaf-icon { width: 192px; height: auto; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- ── Header ─────────────────────────────────────── -->
    <header class="header">
      <!-- Logo -->
      <img class="leaf-icon" src="logo v3.svg" alt="Maple Designs Creations logo" aria-hidden="true" />

      <h1>Maple Designs Creations</h1>
      <p class="tagline">Handcrafted with love &amp; Canadian soul</p>
      <div class="divider"></div>
    </header>

    <!-- ── Links ──────────────────────────────────────── -->
    <nav class="links" aria-label="Social links and contact">

      <!-- Facebook -->
      <a class="link-btn" href="https://www.facebook.com/profile.php?id=61555884101821" target="_blank" rel="noopener noreferrer">
        <span class="link-icon icon-facebook" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073C24 5.404 18.627 0 12 0S0 5.404 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.791-4.697 4.533-4.697 1.313 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.884v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
          </svg>
        </span>
        <span class="link-label">
          <span class="platform">Facebook</span>
          <span class="action">Follow our page</span>
        </span>
        <svg class="link-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </a>

      <!-- Instagram -->
      <a class="link-btn" href="https://www.instagram.com/mapledesignscreations/" target="_blank" rel="noopener noreferrer">
        <span class="link-icon icon-instagram" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.334 3.608 1.308.974.975 1.245 2.241 1.307 3.608.058 1.265.069 1.645.069 4.849s-.011 3.584-.069 4.849c-.062 1.366-.333 2.633-1.307 3.608-.975.974-2.242 1.245-3.608 1.307-1.266.058-1.645.07-4.85.07s-3.584-.012-4.849-.07c-1.366-.062-2.633-.333-3.608-1.307-.975-.975-1.245-2.242-1.308-3.608C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.849c.063-1.367.333-2.633 1.308-3.608C4.516 2.497 5.782 2.226 7.148 2.163 8.414 2.105 8.795 2.163 12 2.163zm0-2.163C8.741 0 8.333.014 7.053.072 5.197.157 3.355.636 1.998 1.998.636 3.355.157 5.197.072 7.053.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.085 1.856.564 3.698 1.926 5.054C3.355 23.364 5.197 23.843 7.053 23.928 8.333 23.986 8.741 24 12 24s3.667-.014 4.947-.072c1.856-.085 3.698-.564 5.054-1.926 1.362-1.356 1.841-3.198 1.926-5.054.058-1.28.073-1.689.073-4.948 0-3.259-.015-3.667-.073-4.947-.085-1.856-.564-3.698-1.926-5.054C20.698.636 18.856.157 17 .072 15.667.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zm0 10.162a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
          </svg>
        </span>
        <span class="link-label">
          <span class="platform">Instagram</span>
          <span class="action">See our creations</span>
        </span>
        <svg class="link-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </a>

      <!-- Email -->
      <a class="link-btn" href="mailto:mapledesignscreations@gmail.com">
        <span class="link-icon icon-email" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
          </svg>
        </span>
        <span class="link-label">
          <span class="platform">Email</span>
          <span class="action">Get in touch with us</span>
        </span>
        <svg class="link-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </a>

    </nav>

    <!-- ── Footer ──────────────────────────────────────── -->
    <footer class="footer">
      <p>&copy; <span id="year"></span> <strong>Maple Designs Creations</strong></p>
      <p>Made with care &amp; a touch of maple</p>
    </footer>

  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
